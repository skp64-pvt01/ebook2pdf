name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write
  packages: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      deb_version: ${{ steps.parse.outputs.deb_version }}
      tag_name: ${{ steps.parse.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Parsing tag: $TAG"
          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-.*)?$ ]]; then
            VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            PRERELEASE="${BASH_REMATCH[4]:-}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            if [ -z "$PRERELEASE" ]; then
              echo "deb_version=${VERSION}-1" >> "$GITHUB_OUTPUT"
            else
              echo "deb_version=${VERSION}${PRERELEASE}-1" >> "$GITHUB_OUTPUT"
            fi
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
            echo "Detected version: $VERSION"
          else
            echo "::error::Invalid tag format: $TAG"
            echo "Expected: v<x.y.z> or v<x.y.z>-prerelease"
            exit 1
          fi

  build:
    needs: validate-tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            dpkg-dev \
            debhelper \
            dh-python \
            python3-all \
            python3-pypdf \
            build-essential \
            libxml2-dev \
            libxslt1-dev \
            wget \
            unzip
          sudo apt-get install -y -qq \
            calibre \
            python3-pymupdf \
            python3-venv || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip build setuptools wheel
          python -m pip install -e ".[font-audit]"

      - name: Prepare release metadata
        run: |
          TAG="${{ needs.validate-tag.outputs.tag_name }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${{ needs.validate-tag.outputs.version }}" >> "$GITHUB_ENV"
          git config --global user.email 'ci-bot@ebook2pdf.local'
          git config --global user.name 'ebook2pdf CI'
          git checkout -B release/${{ needs.validate-tag.outputs.version }} || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v || echo "No pytest suite yet"
          python -c "from ebook2pdf import __version__"
          python -m ebook2pdf --help > /dev/null

      - name: Build Python package
        run: |
          python -m build --outdir dist/

      - name: Build Debian package
        run: |
          chmod +x debian/rules
          ./dev.sh build
          if ! ./dev.sh deb; then
            echo "Falling back to dpkg-buildpackage -d"
            dpkg-buildpackage -us -uc -b -d
          fi

      - name: Store Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: |
            ../*.deb
          retention-days: 90

      - name: Store Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: |
            dist/*
          retention-days: 90

      - name: Store test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            /tmp/help.txt
          retention-days: 30

  changelog:
    needs: [validate-tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from tag
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags "${{ github.event.before }}" 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG="## ${{ needs.validate-tag.outputs.tag_name }}\n\nInitial release with full ebook-to-PDF pipeline, patch mode, and universal converter support."
          else
            CHANGELOG=$(git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG..${{ github.event.after }}" || echo "")
            CHANGELOG="## ${{ needs.validate-tag.outputs.tag_name }}\n\n${CHANGELOG}"
          fi
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Store changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
          retention-days: 30

  release:
    needs: [validate-tag, build, changelog]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Debian artifact
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: release/

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: release/dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.validate-tag.outputs.tag_name }}"
          VERSION="${{ needs.validate-tag.outputs.version }}"
          DEB_FILE=$(find release/ -name '*.deb' | head -1)

          cat > /tmp/release_notes.md <<EOF
          # ebook2pdf $VERSION

          ${{ steps.changelog.outputs.changelog }}

          ## Installation

          \`\`\`bash
          # Download and install
          wget https://github.com/skp64-pvt01/ebook2pdf/releases/download/$TAG/$(basename "$DEB_FILE")
          sudo dpkg -i $(basename "$DEB_FILE")
          \`\`\`

          ## Checksums
          \`\`\`
          $(sha256sum "$DEB_FILE")
          \`\`\`
          EOF

          gh release create "$TAG" \
            --title "ebook2pdf $VERSION" \
            --notes-file /tmp/release_notes.md \
            --target main \
            "$DEB_FILE"

      - name: Upload additional assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.validate-tag.outputs.tag_name }}"
          for f in release/dist/*; do
            if [ -f "$f" ]; then
              gh release upload "$TAG" "$f" || true
            fi
          done
